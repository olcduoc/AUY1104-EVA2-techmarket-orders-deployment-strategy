name: Template - Rollback Automático

on:
  workflow_call:
    inputs:
      cluster_name:
        required: true
        type: string
      aws_region:
        required: true
        type: string
      reason:
        required: false
        type: string
        default: 'Health check fallido post-despliegue'
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_SESSION_TOKEN:
        required: true
    outputs:
      rollback_status:
        description: "success o failure"
        value: ${{ jobs.rollback.outputs.status }}

jobs:
  rollback:
    name: Rollback automático Blue-Green
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.confirm.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ inputs.aws_region }}

      - name: Conectar a EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ inputs.cluster_name }} \
            --region ${{ inputs.aws_region }}

      - name: Ejecutar rollback (devolver tráfico a BLUE)
        run: |
          echo "::notice::AUTO-HEALING INICIADO. Motivo: ${{ inputs.reason }}"
          T0=$(date +%s%N)
          kubectl patch service svc-bluegreen \
            -p '{"spec":{"selector":{"app":"demo","version":"blue"}}}'
          TE=$(date +%s%N)
          MTTR=$(( (TE-T0)/1000000 ))
          echo "::notice::Rollback ejecutado en ${MTTR}ms — Tráfico devuelto a BLUE"

      - name: Verificar servicio post-rollback
        id: confirm
        run: |
          LB=$(kubectl get svc svc-bluegreen \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          sleep 15
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://$LB" || echo "000")
          if [ "$HTTP" = "200" ]; then
            echo "::notice::Servicio restaurado exitosamente (HTTP 200)"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "::warning::Servicio responde HTTP $HTTP tras rollback"
            echo "status=warning" >> $GITHUB_OUTPUT
          fi

      - name: Estado final del cluster post-rollback
        if: always()
        run: |
          echo "=== Deployments ==="
          kubectl get deployments
          echo "=== Pods ==="
          kubectl get pods -o wide
          echo "=== Service ==="
          kubectl get svc svc-bluegreen
