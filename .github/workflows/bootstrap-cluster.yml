name: Bootstrap EKS Cluster

# ============================================================
# Crea (o verifica) el cluster EKS, el repo ECR y publica las
# imágenes :v1 y :v2.
#
# Idempotente: si el cluster ya existe, salta la creación.
# Reutilizable: se dispara cada vez que se reinicia el Learner Lab.
# ============================================================

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: 'Nombre del cluster EKS'
        required: true
        default: 'duoc-eks-cluster-cli'
      aws_region:
        description: 'Región AWS'
        required: true
        default: 'us-east-1'
      skip_images:
        description: 'Saltar build/push de imágenes (si ECR ya tiene v1 y v2)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  ECR_REPO: duoc-eks-app

jobs:

  # ------------------------------------------------------------
  # 1. PREFLIGHT — Validaciones previas
  # ------------------------------------------------------------
  preflight:
    name: 1. Preflight
    runs-on: ubuntu-latest
    outputs:
      account_id: ${{ steps.account.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ github.event.inputs.aws_region }}

      - name: Verificar identidad AWS
        id: account
        run: |
          IDENTITY=$(aws sts get-caller-identity)
          echo "$IDENTITY"
          ID=$(echo "$IDENTITY" | jq -r .Account)
          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "::notice::Account ID: $ID"

      - name: Verificar permisos EKS
        run: |
          aws eks list-clusters --region "${{ github.event.inputs.aws_region }}" > /dev/null
          echo "::notice::✓ Permisos EKS OK"

      - name: Verificar permisos ECR (no bloquea)
        run: |
          aws ecr describe-repositories --region "${{ github.event.inputs.aws_region }}" > /dev/null 2>&1 || true
          echo "::notice::✓ Permisos ECR verificados"

      - name: Verificar archivos del repositorio
        run: |
          set -e
          MISSING=0
          for f in cluster-config.yaml app/Dockerfile app/v1/index.html app/v2/index.html; do
            if [ ! -f "$f" ]; then
              echo "::error::Falta archivo: $f"
              MISSING=1
            fi
          done
          if [ ! -d k8s ]; then
            echo "::error::Falta carpeta: k8s/"
            MISSING=1
          fi
          [ "$MISSING" -eq 0 ] && echo "::notice::✓ Todos los archivos requeridos presentes"
          exit $MISSING

  # ------------------------------------------------------------
  # 2. PROVISION CLUSTER — Crea o verifica el cluster EKS
  # ------------------------------------------------------------
  provision-cluster:
    name: 2. Provisionar cluster EKS
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ github.event.inputs.aws_region }}

      - name: Instalar eksctl
        run: |
          ARCH=amd64
          PLATFORM="$(uname -s)_$ARCH"
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_${PLATFORM}.tar.gz"
          tar -xzf "eksctl_${PLATFORM}.tar.gz" -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin
          rm -f "eksctl_${PLATFORM}.tar.gz"
          eksctl version

      - name: ¿Cluster ya existe?
        id: check
        run: |
          if aws eks describe-cluster \
               --name "${{ github.event.inputs.cluster_name }}" \
               --region "${{ github.event.inputs.aws_region }}" >/dev/null 2>&1; then
            STATUS=$(aws eks describe-cluster \
                       --name "${{ github.event.inputs.cluster_name }}" \
                       --region "${{ github.event.inputs.aws_region }}" \
                       --query cluster.status --output text)
            echo "::notice::Cluster ya existe (status: $STATUS)"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "::notice::Cluster NO existe; se creará"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generar cluster-config.yaml con account ID dinámico
        if: steps.check.outputs.exists == 'false'
        run: |
          ACCOUNT_ID="${{ needs.preflight.outputs.account_id }}"
          # Reemplazar account ID hardcoded por el actual
          sed -i "s|arn:aws:iam::[0-9]*:role/LabRole|arn:aws:iam::${ACCOUNT_ID}:role/LabRole|g" cluster-config.yaml
          # Asegurar el nombre del cluster
          sed -i "s|^  name: .*|  name: ${{ github.event.inputs.cluster_name }}|" cluster-config.yaml
          echo "--- cluster-config.yaml efectivo ---"
          cat cluster-config.yaml

      - name: Crear cluster (15-25 min)
        if: steps.check.outputs.exists == 'false'
        run: |
          eksctl create cluster -f cluster-config.yaml

      - name: Configurar kubectl
        run: |
          aws eks update-kubeconfig \
            --name "${{ github.event.inputs.cluster_name }}" \
            --region "${{ github.event.inputs.aws_region }}"

      - name: Esperar nodos Ready
        run: |
          echo "Esperando que los nodos estén Ready..."
          for i in {1..30}; do
            READY=$(kubectl get nodes --no-headers 2>/dev/null | awk '{print $2}' | grep -c "^Ready$" || echo "0")
            TOTAL=$(kubectl get nodes --no-headers 2>/dev/null | wc -l || echo "0")
            echo "Intento $i/30: $READY/$TOTAL nodos Ready"
            if [ "$READY" -ge 2 ]; then
              echo "::notice::✓ $READY nodos Ready"
              kubectl get nodes
              exit 0
            fi
            sleep 10
          done
          echo "::error::No se alcanzó el quórum de nodos Ready (>=2)"
          kubectl get nodes
          exit 1

  # ------------------------------------------------------------
  # 3. PROVISION ECR + PUSH IMAGES
  # ------------------------------------------------------------
  provision-ecr:
    name: 3. Provisionar ECR y publicar imágenes
    needs: [preflight, provision-cluster]
    if: github.event.inputs.skip_images != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ github.event.inputs.aws_region }}

      - name: Crear/verificar repositorio ECR
        run: |
          if aws ecr describe-repositories \
               --repository-names "$ECR_REPO" \
               --region "${{ github.event.inputs.aws_region }}" >/dev/null 2>&1; then
            echo "::notice::Repo ECR $ECR_REPO ya existe"
          else
            echo "::notice::Creando repo ECR $ECR_REPO"
            aws ecr create-repository \
              --repository-name "$ECR_REPO" \
              --region "${{ github.event.inputs.aws_region }}"
          fi

      - name: Login a ECR
        run: |
          ACCOUNT="${{ needs.preflight.outputs.account_id }}"
          REGION="${{ github.event.inputs.aws_region }}"
          aws ecr get-login-password --region "$REGION" | \
            docker login --username AWS --password-stdin "${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com"

      - name: Build y push v1
        run: |
          ACCOUNT="${{ needs.preflight.outputs.account_id }}"
          REGION="${{ github.event.inputs.aws_region }}"
          IMAGE="${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${ECR_REPO}:v1"

          cp app/v1/index.html app/index.html
          docker build -t "$IMAGE" app/
          docker push "$IMAGE"
          rm app/index.html
          echo "::notice::✓ v1 publicada: $IMAGE"

      - name: Build y push v2
        run: |
          ACCOUNT="${{ needs.preflight.outputs.account_id }}"
          REGION="${{ github.event.inputs.aws_region }}"
          IMAGE="${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${ECR_REPO}:v2"

          cp app/v2/index.html app/index.html
          docker build -t "$IMAGE" app/
          docker push "$IMAGE"
          rm app/index.html
          echo "::notice::✓ v2 publicada: $IMAGE"

      - name: Verificar imágenes en ECR
        run: |
          echo "Imágenes en $ECR_REPO:"
          aws ecr describe-images \
            --repository-name "$ECR_REPO" \
            --region "${{ github.event.inputs.aws_region }}" \
            --query 'imageDetails[].imageTags[]' --output text

  # ------------------------------------------------------------
  # 4. RESUMEN
  # ------------------------------------------------------------
  summary:
    name: 4. Resumen
    needs: [preflight, provision-cluster, provision-ecr]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Resumen del bootstrap
        run: |
          echo "============================================"
          echo "  Bootstrap AUY1104 EVA2 - Resumen"
          echo "============================================"
          echo "Cluster:    ${{ github.event.inputs.cluster_name }}"
          echo "Región:     ${{ github.event.inputs.aws_region }}"
          echo "Account ID: ${{ needs.preflight.outputs.account_id }}"
          echo ""
          echo "Preflight:        ${{ needs.preflight.result }}"
          echo "Provision-cluster: ${{ needs.provision-cluster.result }}"
          echo "Provision-ecr:     ${{ needs.provision-ecr.result }}"
          echo ""
          if [ "${{ needs.provision-cluster.result }}" = "success" ]; then
            echo "::notice::✓ Bootstrap OK. Ahora podés desplegar:"
            echo "    gh workflow run deploy-eks.yml -f strategy=blue-green -f action=deploy"
          else
            echo "::error::Bootstrap incompleto. Revisá los logs de cada job."
            exit 1
          fi
