# Configuración nginx para la imagen v3-broken (EVA3).
# /healthz   -> 200 (lo que evalúa el readinessProbe de Kubernetes)
# /          -> 500 (lo que evalúa el smoke test del pipeline)
#
# Esto reproduce un escenario realista: un readinessProbe superficial
# que pasa sin problema mientras el endpoint real que sirve tráfico
# está degradado.
server {
    listen 80;

    location /healthz {
        default_type text/plain;
        return 200 'ok';
    }

    location / {
        return 500 'Internal Server Error (fallo simulado EVA3)';
    }
}
