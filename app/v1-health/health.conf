server {
    listen 80;

    location /health {
        default_type application/json;
        return 200 '{"status":"healthy","version":"v1","service":"techmarket-orders"}';
    }

    location /ready {
        default_type application/json;
        return 200 '{"status":"ready"}';
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
